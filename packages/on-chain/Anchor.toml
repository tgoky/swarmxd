[toolchain]
anchor_version = "0.30.1"

[features]
seeds = true
skip-lint = false

[programs.localnet]
swarm_memory = "SwrmMem11111111111111111111111111111111111111"

[programs.devnet]
swarm_memory = "SwrmMem11111111111111111111111111111111111111"

[programs.mainnet]
swarm_memory = "REPLACE_WITH_DEPLOYED_PROGRAM_ID"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[[test.validator.clone]]
address = "metaqbxxUerdq28cj1RbAWkYQm3ybzjb6a8bt518x1s"

[test.settings]
startup_wait = 5000
